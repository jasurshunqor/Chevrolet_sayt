{% extends 'base.html' %}

{% block title %}Kirish{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg rounded-3">
                <div class="card-header bg-dark text-white text-center py-3">
                    <h4 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Tizimga Kirish</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" class="form-control" name="username" placeholder="Username kiriting" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Parol</label>
                            <input type="password" class="form-control" name="password" placeholder="Parol kiriting" required>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-dark btn-lg">Kirish</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center py-3">
                    <p class="mb-0">Akkauntingiz yo'qmi? <a href="{% url 'register' %}" class="fw-semibold">Ro'yxatdan O'tish</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
